<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html lang="en"
      	xmlns="http://www.w3.org/1999/xhtml"
      	xmlns:h="http://java.sun.com/jsf/html"
   		xmlns:f="http://java.sun.com/jsf/core"
    	xmlns:p="http://primefaces.org/ui">

<h:body>

	
<f:view>
	
	<h:form id="formInsciption">
		
		
		<h:panelGrid border="1" columns="2">
			<h:outputLabel value="Nom*"></h:outputLabel>
			<h:inputText  id="username"  size="20" label="UserName" 
            required="true">
            <f:validateLength for="username" minimum="5" maximum="20" />			
         </h:inputText>     
			
				<h:outputLabel value="Prenom"></h:outputLabel>
			<h:inputText id="prenom"></h:inputText>
			<h:outputLabel value="Mot de Passe"></h:outputLabel>
			<h:inputSecret id="mdp" required="true"></h:inputSecret>
			<h:outputLabel value="Sexe*"></h:outputLabel>
				<h:selectOneRadio id="selectSexe">
					<f:selectItem itemValue="Homme" itemLabel="Homme" />
   					<f:selectItem itemValue="Femme" itemLabel="Femme" />
				</h:selectOneRadio>
			<h:outputText value="Nombre d'Enfant"></h:outputText>
			<h:selectOneListbox id="listeEnfant" size="1">
				<f:selectItem id="itemZero" itemLabel="0" itemValue="0"></f:selectItem>
				<f:selectItem id="itemUn" itemLabel="1" itemValue="1"></f:selectItem>
				<f:selectItem id="itemDeux" itemLabel="2" itemValue="2"></f:selectItem>
			</h:selectOneListbox>	
			<h:commandButton id="cmdValider"></h:commandButton>
			</h:panelGrid>
			 <h:messages style="color:red;margin:8px;" />
	</h:form>
	
		<h:outputLabel value="Liste Eleve"></h:outputLabel>
		<h:form id="formInsciption">



			<h:selectManyListbox id="liste" size="2">
				<f:selectItems value="#{classeEleve.liste}"></f:selectItems>
			</h:selectManyListbox>

		</h:form>
</f:view>


</h:body>
</html>
